name: Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build (Tauri)
        env:
          # Set this repo secret to bake your OpenRouter key into the built
          # binary as the default AI provider. Keep it spend-capped (see
          # README "Licensing & built-in key").
          BUILT_IN_OPENROUTER_KEY: ${{ secrets.BUILT_IN_OPENROUTER_KEY }}
        run: npm run tauri build -- ${{ matrix.args }}

      # Just hands you the built files from the Actions run page — no tag,
      # no GitHub Release, nothing published anywhere. Publishing stays a
      # manual step whenever you decide to do it yourself.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notion-ai-assistant-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe